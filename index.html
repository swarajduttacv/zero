
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeroGPT Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Safer process polyfill: only define if absolutely missing
      if (typeof window.process === 'undefined') {
        window.process = { env: {} };
      } else if (typeof window.process.env === 'undefined') {
        window.process.env = {};
      }
      
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                950: '#020617',
                900: '#1e293b',
                800: '#334155',
                700: '#475569',
                500: '#3b82f6',
                accent: '#f97316',
              },
              profit: '#10b981',
              loss: '#ef4444',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0f172a;
        color: #f1f5f9;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      
      /* CRITICAL: Fix for Chrome/Edge Autofill White Background */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active{
          -webkit-box-shadow: 0 0 0 30px #020617 inset !important;
          -webkit-text-fill-color: white !important;
          transition: background-color 5000s ease-in-out 0s;
      }

      /* Global Input Styling */
      input, textarea, select {
        color: #ffffff !important;
        background-color: #020617 !important;
        border: 1px solid #334155 !important;
        font-family: inherit;
      }
      
      input:focus, textarea:focus {
        border-color: #3b82f6 !important;
        outline: none !important;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3) !important;
      }

      /* Distinct Placeholder Color */
      input::placeholder, textarea::placeholder {
        color: #64748b !important;
        opacity: 1;
      }

      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        background-color: #0f172a;
      }

      .initial-loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.471.0",
        "react/": "https://aistudiocdn.com/react@^19.2.1/",
        "react": "https://aistudiocdn.com/react@^19.2.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.2.1",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
        "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
        "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"><div class="initial-loader"></div></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
