
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeroGPT Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // POLYFILL: Ensure 'process' exists for libraries that expect it (like Gemini SDK or env var access)
      if (typeof process === 'undefined') {
        window.process = { env: {} };
      }
      
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                900: '#1e293b', // Slate 900
                800: '#334155', // Slate 700
                500: '#3b82f6', // Blue 500
                accent: '#f97316', // Orange 500 (Zerodha-ish)
              },
              profit: '#10b981', // Emerald 500
              loss: '#ef4444', // Red 500
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0f172a; /* Slate 950 */
        color: #f1f5f9; /* Slate 100 */
      }
      /* Custom scrollbar for chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Loading Pulse */
      .loader-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0"
  }
}
</script>
</head>
  <body>
    <div id="root">
        <!-- Initial Loading State (Visible before React Mounts) -->
        <div style="height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; font-family: sans-serif; background-color: #0f172a; color: white;">
            <div style="width: 48px; height: 48px; border: 4px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <h2 class="loader-pulse" style="font-size: 1.25rem; font-weight: 600;">Initializing ZeroGPT...</h2>
            <style>
                @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            </style>
        </div>
    </div>
  </body>
</html>
