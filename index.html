
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeroGPT Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // 1. CRITICAL: Polyfill process.env BEFORE any modules load
      window.process = window.process || { env: {} };
      window.process.env = window.process.env || {};
      
      // Configure Tailwind
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                950: '#020617', // Deepest Slate
                900: '#1e293b', // Slate 900
                800: '#334155', // Slate 800
                700: '#475569', // Slate 700
                500: '#3b82f6', // Blue 500
                accent: '#f97316', // Orange 500
              },
              profit: '#10b981',
              loss: '#ef4444',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0f172a;
        color: #f1f5f9;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      
      /* Force visibility for all inputs to prevent 'invisible text' issues */
      input {
        color: #ffffff !important;
      }
      input::placeholder {
        color: #64748b !important;
      }
      
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        background-color: #0f172a;
      }

      .initial-loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      
      .initial-text {
        font-family: sans-serif;
        color: #94a3b8;
        font-size: 0.875rem;
        letter-spacing: 0.025em;
        animation: pulse 2s infinite;
      }

      #troubleshoot {
        display: none;
        margin-top: 2rem;
        text-align: center;
        max-width: 300px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.471.0",
        "react/": "https://aistudiocdn.com/react@^19.2.1/",
        "react": "https://aistudiocdn.com/react@^19.2.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.2.1",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
        "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
        "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0"
      }
    }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader"></div>
      <div class="initial-text" id="status-text">Synchronizing Modules...</div>
      
      <div id="troubleshoot">
        <p style="color: #ef4444; font-size: 0.75rem; margin-bottom: 1rem;">Startup is taking longer than expected.</p>
        <button onclick="localStorage.clear(); window.location.reload();" 
                style="background: #1e293b; color: white; padding: 8px 16px; border-radius: 6px; border: 1px solid #334155; font-size: 0.75rem; cursor: pointer; transition: all 0.2s;">
          Reset Data & Reload
        </button>
      </div>
    </div>

    <script>
      setTimeout(() => {
        const troubleshoot = document.getElementById('troubleshoot');
        const status = document.getElementById('status-text');
        const root = document.getElementById('root');
        if (root && root.children.length <= 2) {
          if (troubleshoot) troubleshoot.style.display = 'block';
          if (status) status.innerText = 'Initialization Delayed';
        }
      }, 5000);
    </script>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
